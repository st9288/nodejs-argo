name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    # 移除了 paths 限制，防止漏掉其他新增文件的更新
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # 关键修改：只保留默认的 amd64，构建速度将从几分钟缩短到几十秒
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/deploysamt2606:latest
            ghcr.io/${{ github.repository_owner }}/deploysamt2606:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=HTTP Server
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
